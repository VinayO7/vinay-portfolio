<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f5efe4"/>
    </linearGradient>
  </defs>

  <rect
    x="2"
    y="2"
    width="60"
    height="60"
    rx="18"
    fill="url(#glass)"
    stroke="#c58b3d"
    stroke-width="1.5"
  />

  <!-- Glass highlight -->
  <path
    d="M10 12 C20 6, 44 6, 54 12"
    fill="none"
    stroke="#ffffff"
    stroke-opacity="0.9"	
    stroke-width="2"
    stroke-linecap="round"
  />

  <!-- VQ -->
  <text
    x="50%"
    y="56%"
    text-anchor="middle"
    font-size="22"
    font-weight="700"
    font-family="Arial, sans-serif"
    fill="#c58b3d"
  >
    VQ
  </text>

  <!-- Accent dot -->
  <circle
    cx="50"
    cy="18"
    r="4"
    fill="#e8b04a"
  />
</svg>